<div
  role="dialog"
  aria-modal="true"
  [attr.aria-label]="openVideo.title"
  class="fixed inset-0 z-[60] grid place-items-center bg-secondary/70 p-4 backdrop-blur-sm animate-fade-in"
  (click)="close()"
>
  <div
    class="relative w-full max-w-4xl overflow-hidden rounded-2xl border border-border bg-surface-elevated shadow-soft"
    (click)="$event.stopPropagation()"
  >
    <button
      aria-label="Close"
      (click)="close()"
      class="absolute right-3 top-3 z-10 grid h-9 w-9 place-items-center rounded-full bg-secondary/80 text-secondary-foreground hover:bg-secondary cursor-pointer"
    >
      <svg lucideX class="h-4 w-4" />
    </button>
    <div class="aspect-video w-full bg-black">
      <app-tutorial-player
        [videoId]="openVideo.videoId"
        [title]="openVideo.title"
      />
    </div>
    <div class="grid gap-6 p-6 sm:grid-cols-[1.4fr_1fr] overflow-auto lg:h-[25vh] h-[30vh]">
      <div>
        <div class="flex flex-wrap items-center gap-2">
          <app-difficulty-badge [difficulty]="openVideo.difficulty" />
          <span class="text-xs text-muted-foreground">{{
            openVideo.category
          }}</span>
          <span class="text-xs text-muted-foreground">•</span>
          <span
            class="inline-flex items-center gap-1 text-xs text-muted-foreground"
          >
            <svg lucideClock class="h-3.5 w-3.5" />
            {{ openVideo.duration }}
          </span>
        </div>
        <h3 class="mt-2 font-display text-xl font-bold">
          {{ openVideo.title }}
        </h3>
        <p class="mt-1.5 text-sm text-muted-foreground">
          {{ openVideo.description }}
        </p>
        <div class="mt-4 rounded-xl border border-border bg-surface p-4">
          <p
            class="text-xs font-semibold uppercase tracking-wider text-muted-foreground"
          >
            Your progress
          </p>
          <div class="mt-2 h-2 w-full overflow-hidden rounded-full bg-muted">
            <div class="h-full w-[15%] rounded-full bg-primary"></div>
          </div>
          <p class="mt-2 text-xs text-muted-foreground">15% watched</p>
        </div>
      </div>
      <div>
        <p
          class="text-xs font-semibold uppercase tracking-wider text-muted-foreground"
        >
          Related
        </p>
        <ul class="mt-3 space-y-2">
          @for (t of relatedVideos; track $index) {
            <li key="{t.id}">
              <button
                (click)="watchVideo(t)"
                class="flex w-full items-center gap-3 rounded-xl border border-border bg-surface p-2 text-left transition hover:border-primary/40"
              >
                <img
                  [src]="
                    'https://img.youtube.com/vi/' + t.videoId + '/default.jpg'
                  "
                  [alt]="t.title"
                  class="h-12 w-20 shrink-0 rounded-md object-cover"
                  loading="lazy"
                />
                <span class="line-clamp-2 text-xs font-medium">{{
                  t.title
                }}</span>
              </button>
            </li>
          }
        </ul>
      </div>
    </div>
  </div>
</div>
