<a
  href="#"
  class="group inline-flex items-center gap-3 rounded-2xl border border-border bg-secondary px-5 py-3 text-secondary-foreground shadow-soft transition hover:-translate-y-0.5 hover:shadow-elevated"
>
  @if (isPlay) {
    <svg viewBox="0 0 24 24" class="h-7 w-7 fill-current" aria-hidden>
      <path
        d="M3.6 2.3 14 12 3.6 21.7c-.4-.3-.6-.8-.6-1.3V3.6c0-.5.2-1 .6-1.3zM15.6 13.6 5.7 22.4l11.3-6.4-1.4-2.4zM5.7 1.6 15.6 10.4l1.4-2.4L5.7 1.6zm12.1 7.6 3.2 1.8c.8.5.8 1.6 0 2.1l-3.2 1.8L16 12l1.8-2.8z"
      />
    </svg>
  } @else {
    <ng-icon [svg]="lucideApple" class="h-7 w-7" />
  }
  <div class="text-left leading-tight">
    <div class="text-[10px] uppercase tracking-wider opacity-80">
      {{ isPlay ? "Get it on" : "Download on the" }}
    </div>
    <div class="font-display text-base font-bold">
      {{ isPlay ? "Google Play" : "App Store" }}
    </div>
  </div>
</a>
